<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Maestro Estudiante</title>
    <!-- Scripts Base Sup -->
    <!-- Google Font: Source Sans Pro -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link href="../Estilos/adminlte.min.css" rel="stylesheet" />
    <link href="../Estilos/css/all.min.css" rel="stylesheet" />
    <link href="../Scripts_Form/Comunes/bootstrap.min.css" rel="stylesheet" />
    <link href="../Scripts_Form/Comunes/sweetalert2.min.css" rel="stylesheet" />

</head>
<body class="hold-transition sidebar-mini">
    <section class="content">
        <div class="container-fluid">
            <div class="row">
                <!-- left column -->
                <div class="col-md-12" id="dvMenu">
                    <!-- Para incrustar la página que contiene el ménu de navegación-->
                </div>
                <div class="col-md-12">
                    <div class="card card-primary">
                        <div class="card-header">
                            <h3 class="card-title">Maestro de Estudiante</h3>
                        </div>
                        <form id="frmDatosIn">
                            <div class="card-body">
                                <div class="card card-gray-dark">
                                    <div class="card-header">
                                        <h3 class="card-title">Datos de Entrada</h3>
                                    </div>

                                    <div class="card-body">

                                        <div class="row">
                                            <div class="col-md-6">
                                                <div class="form-group">
                                                    <label for="txtCarnet">Carnet:</label>
                                                    <input type="text" class="form-control" id="txtCarnet" width="15" placeholder="Ingrese Código...">
                                                </div>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-3">
                                                <div class="form-group">
                                                    <label for="txtNroDoc">Nro Documento:</label>
                                                    <input type="text" class="form-control" id="txtNroDoc" placeholder="Número de documento">
                                                </div>
                                            </div>
                                            <div class="col-md-3">
                                                <div class="form-group">
                                                    <label for="cboTipoDoc">Tipo de documento:</label>
                                                    <select class="form-control" id="cboTipoDoc">
                                                    </select>
                                                </div>
                                            </div>
                                            <div class="col-md-6">
                                                <div class="form-group">
                                                    <label for="txtNombre">Nombre:</label>
                                                    <input type="text" class="form-control" id="txtNombre" placeholder="Nombre">
                                                </div>
                                            </div>

                                        </div>

                                        <div class="row">

                                            <div class="col-md-5">
                                                <div class="form-group">
                                                    <label for="cboJornada">Jornada:</label>
                                                    <select class="form-control" id="cboJornada">
                                                    </select>
                                                </div>
                                            </div>

                                            <div class="col-md-1">
                                                <div class="form-group">
                                                    <label for="chkActivo">Activo</label>
                                                    <input type="checkbox" class="form-control" id="chkActivo" placeholder="CHECKBOX">
                                                </div>
                                            </div>
                                        </div>

                                        <div class="row">
                                            <div class="col-md-6">
                                                <div class="form-group">
                                                    <label for="cboFacultad">Facultad:</label>
                                                    <select class="form-control" id="cboFacultad">
                                                    </select>
                                                </div>
                                            </div>

                                            <div class="col-md-6">
                                                <div class="form-group">
                                                    <label for="cboPrograma">Programa:</label>
                                                    <select class="form-control" id="cboPrograma">
                                                    </select>
                                                </div>
                                            </div>

                                        </div>


                                        <div class="row">
                                            <div class="col-md-12">
                                                <div class="form-group">
                                                    <label for="txtObserv">Observaciones:</label>
                                                    <textarea class="form-control" id="txtObserv" rows="3" placeholder="Observaciones..."></textarea>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="card-body">
                                            <!-- Menú de Opciones -->
                                            <div class="row">
                                                <div class="col-md-3">
                                                    <div class="form-group">
                                                        <button type="button" id="btnAgre" class="btn-block btn-lg btn-primary">Agregar</button>
                                                    </div>
                                                </div>
                                                <div class="col-md-3">
                                                    <div class="form-group">
                                                        <button type="button" id="btnModi" class="btn-block btn-lg btn-primary">Modificar</button>
                                                    </div>
                                                </div>
                                                <div class="col-md-2">
                                                    <div class="form-group">
                                                        <button type="button" id="btnBusc" class="btn-block btn-lg btn-primary">Buscar</button>
                                                    </div>
                                                </div>

                                                <div class="col-md-2">
                                                    <div class="form-group">
                                                        <button type="button" id="btnCanc" class="btn-block btn-lg btn-primary">Cancelar/Limpiar</button>
                                                    </div>
                                                </div>
                                                <div class="col-md-2">
                                                    <div class="form-group">
                                                        <button type="button" id="btnImpr" class="btn-block btn-lg btn-primary">Impresión</button>
                                                    </div>
                                                </div>
                                            </div>
                                            <!-- Fin Menú de Opciones-->
                                            <!-- Zona de Mensajes -->
                                            <div class="card-footer">
                                                <div id="dvMensaje" class=""></div>
                                            </div>

                                            <!-- INICIO Sección ingresados (oculta al inicio) -->
                                            <!-- Acá va la Sección de ingresados con la tabla respectiva -->
                                            <!-- FIN Sección ingresados -->
                                        </div>
                                    </div><!-- card card-gray-dark -->
                                <!-- Acá row para la tabla -->
                                <div class="row">
                                    <div class="col-md-12">
                                        <table id="tblDatos" class="table table-bordered table-striped">
                                            <thead>
                                                <tr>
                                                    <th></th>
                                                    <th></th>
                                                    <th></th>
                                                </tr>
                                            </thead>
                                        </table>
                                    </div>
                                </div>
                                <!-- Fin row para la tabla -->

                            </div>  <!-- /.card-body -->

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="../Scripts/jquery-3.7.0.min.js"></script>
    <script src="../Scripts/bootstrap.bundle.min.js"></script>
    <!-- Para el script de control -->
    <script src="../Scripts_Form/frmInicio.js"></script>
    <script src="../Scripts_Form/frmEstudiante.js"></script>
    <script src="../Scripts_Form/Comunes/sweetalert2.all.min.js"></script>
</body>
</html>
